# ============================================================
#  Nginx reverse proxy for STS2 Community Stats API
#  Place at /etc/nginx/conf.d/default.conf
# ============================================================

# Rate limiting zone (per-IP)
limit_req_zone $binary_remote_addr zone=api_upload:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_query:10m  rate=60r/m;
# Lightweight rate limit for health checks (prevent DoS polling)
limit_req_zone $binary_remote_addr zone=api_health:10m rate=30r/m;

# Upstream
# Docker Compose 内部通信：必须用服务名 `api`（由 Compose 内部 DNS
# 解析到 api 容器的网络接口），并用容器内部端口 8080（不是宿主映射
# 端口 5080）。之前写成 127.0.0.1:8080 会指向 nginx 容器自己的 loopback，
# 永远连不到 api 容器 → 502 Bad Gateway。
upstream api_backend {
    server api:8080;
    keepalive 16;
}

# HTTP server — rate-limited API proxy + HTTPS redirect for browsers
server {
    listen 80;
    server_name statsthespire.duckdns.org;

    # Let's Encrypt HTTP challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API endpoints — proxy directly over HTTP so game clients that cannot
    # follow HTTPS redirects (Godot/C# HttpClient quirks) still work.
    # Security: these are read-only game statistics; the upload endpoint
    # (/v1/runs) is intentionally excluded — uploads MUST use HTTPS.
    location /health {
        limit_req zone=api_health burst=3 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/stats/ {
        limit_req zone=api_query burst=20 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location /v1/meta/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → redirect to HTTPS (browser requests, etc.)
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name statsthespire.duckdns.org;

    # ── SSL (Let's Encrypt / certbot) ───────────────────
    ssl_certificate     /etc/letsencrypt/live/statsthespire.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/statsthespire.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options    "nosniff" always;
    # Prevent clickjacking (API-only, no iframes needed)
    add_header X-Frame-Options           "DENY" always;
    # Legacy XSS filter (for older browsers)
    add_header X-XSS-Protection          "1; mode=block" always;
    # HSTS: enforce HTTPS for 1 year (DuckDNS subdomain only, no includeSubDomains
    # since DuckDNS's *.duckdns.org may host other non-HTTPS services)
    add_header Strict-Transport-Security "max-age=31536000" always;
    # Restrict referrer information to same origin
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # Disable potentially dangerous browser features
    add_header Permissions-Policy        "interest-cohort=()" always;
    # Content-Security-Policy: allow self-origin scripts/styles only
    add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'" always;

    # ── Request size limits ─────────────────────────────
    client_max_body_size 1m;  # Run uploads should be <100KB

    # ── Health check (lightweight rate limit) ───────────
    location /health {
        limit_req zone=api_health burst=3 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Upload endpoint (stricter rate limit) ───────────
    location /v1/runs {
        limit_req zone=api_upload burst=5 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ── Query endpoints ─────────────────────────────────
    location /v1/stats/ {
        limit_req zone=api_query burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache bulk responses at Nginx level (optional)
        proxy_cache_valid 200 5m;
        proxy_read_timeout 15s;
    }

    location /v1/meta/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Block everything else ───────────────────────────
    location / {
        return 404;
    }
}
