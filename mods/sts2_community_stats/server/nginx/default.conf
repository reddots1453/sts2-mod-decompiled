# ============================================================
#  Nginx reverse proxy for STS2 Community Stats API
#  Domain: statsthespire.xyz
# ============================================================

# Rate limiting zones (per-IP)
limit_req_zone $binary_remote_addr zone=api_upload:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_query:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_health:10m rate=30r/m;

upstream api_backend {
    server api:8080;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name statsthespire.xyz;

    # Let's Encrypt HTTP challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS API server ──────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name statsthespire.xyz;

    # ── SSL ────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/statsthespire.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/statsthespire.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ───────────────────────────────────
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "interest-cohort=()" always;
    add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'" always;

    # ── Request size limits ────────────────────────────────
    client_max_body_size 1m;

    # ── Health (light rate limit) ──────────────────────────
    location /health {
        limit_req zone=api_health burst=3 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Upload (strict rate limit) ─────────────────────────
    location /v1/runs {
        limit_req zone=api_upload burst=5 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ── Stats queries ─────────────────────────────────────
    location /v1/stats/ {
        limit_req zone=api_query burst=20 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 5m;
        proxy_read_timeout 15s;
    }

    # ── Meta ──────────────────────────────────────────────
    location /v1/meta/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Block everything else ──────────────────────────────
    location / {
        return 404;
    }
}
