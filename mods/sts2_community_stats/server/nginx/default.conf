# ============================================================
#  Nginx reverse proxy for STS2 Community Stats API
#  Place at /etc/nginx/conf.d/default.conf
# ============================================================

# Rate limiting zone (per-IP)
limit_req_zone $binary_remote_addr zone=api_upload:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_query:10m  rate=60r/m;

# Upstream
upstream api_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.sts2stats.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name api.sts2stats.com;

    # ── SSL (Let's Encrypt / certbot) ───────────────────
    ssl_certificate     /etc/letsencrypt/live/api.sts2stats.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sts2stats.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           DENY;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Request size limits ─────────────────────────────
    client_max_body_size 1m;  # Run uploads should be <100KB

    # ── Health check (no rate limit) ────────────────────
    location /health {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Upload endpoint (stricter rate limit) ───────────
    location /v1/runs {
        limit_req zone=api_upload burst=5 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ── Query endpoints ─────────────────────────────────
    location /v1/stats/ {
        limit_req zone=api_query burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache bulk responses at Nginx level (optional)
        proxy_cache_valid 200 5m;
        proxy_read_timeout 15s;
    }

    location /v1/meta/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Block everything else ───────────────────────────
    location / {
        return 404;
    }
}
